<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>S101 绕行地图（安全合规版）</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "微软雅黑", "Segoe UI", sans-serif;
      background: #2c3e2f;
      min-height: 100vh;
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .map-container {
      width: 1300px;
      max-width: 100%;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
      overflow: hidden;
    }
    .map-title { background: #1e3a2f; color: #fff; padding: 14px 20px; }
    .map-title h1 { font-size: 1.25rem; margin-bottom: 4px; }
    .map-title p { font-size: 0.85rem; opacity: 0.85; }
    #map { width: 100%; height: 560px; }
    .control-bar {
      background: #f8f5f0;
      border-top: 1px solid #ddd;
      padding: 12px 18px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }
    .control-btn {
      border: 2px solid #ccc;
      background: #fff;
      border-radius: 20px;
      padding: 6px 12px;
      cursor: pointer;
      font-size: .85rem;
      font-weight: bold;
    }
    .control-btn.active { background: #1e3a2f; border-color: #1e3a2f; color: #fff; }
    .control-btn[data-type="closure"] { border-left: 6px solid #d32f2f; }
    .control-btn[data-type="west"] { border-left: 6px solid #2e7d32; }
    .control-btn[data-type="g312"] { border-left: 6px solid #1976d2; }
    .control-btn[data-type="scenic"] { border-left: 6px solid #ff9800; }
    .locate-btn { margin-left: auto; background: #4caf50; border-color: #2e7d32; color: #fff; }
    .legend {
      padding: 10px 18px;
      background: #fffaf5;
      border-top: 1px solid #eee;
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      font-size: .75rem;
    }
    .legend-item { display: flex; align-items: center; gap: 6px; }
    .legend-color { width: 20px; height: 4px; border-radius: 3px; }
    .legend-color.marker { width: 10px; height: 10px; border-radius: 50%; }
    .red { background: #d32f2f; } .green { background: #2e7d32; } .blue { background: #1976d2; } .orange { background: #ff9800; }
    .info-footer { background: #fff9f0; color: #666; text-align: center; padding: 8px 16px; font-size: .7rem; }
  </style>

  <!-- 必须先设置 securityJsCode -->
  <script>
    window._AMapSecurityConfig = {
      securityJsCode: 'YOUR_SECURITY_JS_CODE'
    };
  </script>
  <!-- 仅 JS Key 用于加载地图底图 -->
  <script src="https://webapi.amap.com/maps?v=2.0&key=YOUR_JS_KEY"></script>
</head>
<body>
  <div class="map-container">
    <div class="map-title">
      <h1>🚧 S101线封闭施工绕行图（高德底图 + 后端路径代理）</h1>
      <p>前端只做展示与交互；路径规划仅通过本地后端 /api/route</p>
    </div>

    <div id="map"></div>

    <div class="control-bar">
      <button class="control-btn active" data-type="s101" id="toggleS101">🛣️ S101主线</button>
      <button class="control-btn active" data-type="closure" id="toggleClosure">🚫 封闭路段</button>
      <button class="control-btn active" data-type="west" id="toggleWest">🟢 西部绕行</button>
      <button class="control-btn active" data-type="g312" id="toggleG312">🔵 312国道绕行</button>
      <button class="control-btn active" data-type="scenic" id="toggleScenic">🏞️ 景点</button>
      <button class="control-btn locate-btn" id="locateBtn">📍 我的位置</button>
    </div>

    <div class="legend">
      <div class="legend-item"><div class="legend-color red"></div><span>封闭施工段</span></div>
      <div class="legend-item"><div class="legend-color green"></div><span>西部绕行</span></div>
      <div class="legend-item"><div class="legend-color blue"></div><span>G312绕行</span></div>
      <div class="legend-item"><div class="legend-color marker orange"></div><span>景点</span></div>
      <div class="legend-item"><div class="legend-color marker blue"></div><span>用户定位</span></div>
    </div>

    <div class="info-footer">安全说明：Web服务 Key 仅存放后端 .env，前端不包含 Web 服务 Key。</div>
  </div>

<script>
(() => {
  const API_BASE = 'http://127.0.0.1:3000';
  let map;
  let userMarker = null;

  const layers = {
    s101Polyline: null,
    westPolyline: null,
    g312Polyline: null,
    closureLine: null,
    closureMarkers: [],
    scenicMarkers: []
  };

  const visibility = {
    s101: true,
    closure: true,
    west: true,
    g312: true,
    scenic: true
  };

  async function safeFetch(url) {
    const res = await fetch(url);
    const text = await res.text();
    try {
      const data = JSON.parse(text);
      if (!res.ok) throw new Error(data.message || `HTTP ${res.status}`);
      return data;
    } catch (e) {
      console.error('接口返回非JSON:', text);
      throw new Error('后端返回错误（非JSON）');
    }
  }

  function setLayerVisible(target, visible) {
    if (!target) return;
    if (Array.isArray(target)) {
      target.forEach(item => item && item.setMap(visible ? map : null));
    } else {
      target.setMap(visible ? map : null);
    }
  }

  function createInfoMarker(point, color) {
    const marker = new AMap.Marker({
      position: [point.lng, point.lat],
      title: point.name,
      label: {
        content: `<div style="background:#fff;padding:2px 6px;border-radius:12px;border:1px solid ${color};color:${color};font-weight:bold;">${point.name}</div>`,
        offset: new AMap.Pixel(0, -20)
      }
    });

    marker.on('click', () => {
      const info = new AMap.InfoWindow({
        offset: new AMap.Pixel(0, -22),
        content: `<div style="padding:6px 10px"><strong>${point.name}</strong><br>${point.desc || ''}</div>`
      });
      info.open(map, [point.lng, point.lat]);
    });

    return marker;
  }

  async function loadAllRoutes(mapData) {
    const fetchRoute = async (points) => {
      const list = points.map(([lng, lat]) => `${lng},${lat}`);
      const origin = list[0];
      const destination = list[list.length - 1];
      const waypoints = list.slice(1, -1).join('|');
      const url = `${API_BASE}/api/route?origin=${encodeURIComponent(origin)}&destination=${encodeURIComponent(destination)}&waypoints=${encodeURIComponent(waypoints)}`;
      const data = await safeFetch(url);
      if (!data.success || !Array.isArray(data.polyline)) throw new Error('路线返回异常');
      return data.polyline;
    };

    const [s101Path, westPath, g312Path] = await Promise.all([
      fetchRoute(mapData.s101Waypoints),
      fetchRoute(mapData.westRoute),
      fetchRoute(mapData.g312Route)
    ]);

    layers.s101Polyline = new AMap.Polyline({ path: s101Path, strokeColor: '#ff6b00', strokeWeight: 5, zIndex: 80 });
    layers.westPolyline = new AMap.Polyline({ path: westPath, strokeColor: '#2e7d32', strokeWeight: 4, zIndex: 70 });
    layers.g312Polyline = new AMap.Polyline({ path: g312Path, strokeColor: '#1976d2', strokeWeight: 4, zIndex: 65 });

    layers.s101Polyline.setMap(map);
    layers.westPolyline.setMap(map);
    layers.g312Polyline.setMap(map);
  }

  function loadStaticLayers(mapData) {
    const closurePath = mapData.closurePoints.map(p => [p.lng, p.lat]);
    layers.closureLine = new AMap.Polyline({
      path: closurePath,
      strokeColor: '#d32f2f',
      strokeWeight: 4,
      strokeStyle: 'dashed',
      zIndex: 90
    });
    layers.closureLine.setMap(map);

    layers.closureMarkers = mapData.closurePoints.map(p => createInfoMarker(p, '#d32f2f'));
    layers.scenicMarkers = mapData.scenicPoints.map(p => createInfoMarker(p, '#ff9800'));

    layers.closureMarkers.forEach(m => m.setMap(map));
    layers.scenicMarkers.forEach(m => m.setMap(map));
  }

  function bindControls() {
    const mapping = {
      toggleS101: ['s101', 's101Polyline'],
      toggleClosure: ['closure', ['closureLine', 'closureMarkers']],
      toggleWest: ['west', 'westPolyline'],
      toggleG312: ['g312', 'g312Polyline'],
      toggleScenic: ['scenic', 'scenicMarkers']
    };

    Object.entries(mapping).forEach(([id, [key, targetKey]]) => {
      const btn = document.getElementById(id);
      btn.addEventListener('click', () => {
        visibility[key] = !visibility[key];
        btn.classList.toggle('active', visibility[key]);

        if (Array.isArray(targetKey)) {
          targetKey.forEach(k => setLayerVisible(layers[k], visibility[key]));
        } else {
          setLayerVisible(layers[targetKey], visibility[key]);
        }
      });
    });

    document.getElementById('locateBtn').addEventListener('click', () => {
      AMap.plugin('AMap.Geolocation', () => {
        const geolocation = new AMap.Geolocation({ enableHighAccuracy: true, timeout: 10000, showButton: false });
        geolocation.getCurrentPosition((status, result) => {
          if (status !== 'complete') {
            alert('定位失败');
            return;
          }
          const pos = [result.position.lng, result.position.lat];
          if (userMarker) userMarker.setMap(null);
          userMarker = new AMap.Marker({ position: pos, label: { content: '我的位置', offset: new AMap.Pixel(0, -22) } });
          userMarker.setMap(map);
          map.setCenter(pos);
          map.setZoom(11);
        });
      });
    });
  }

  async function init() {
    if (typeof AMap === 'undefined') {
      document.getElementById('map').innerHTML = '<div style="padding:40px;color:red;">高德 JS API 加载失败，请检查 JS Key 与 securityJsCode。</div>';
      return;
    }

    map = new AMap.Map('map', {
      center: [86.92, 43.92],
      zoom: 9,
      resizeEnable: true,
      viewMode: '2D'
    });

    try {
      const mapData = await safeFetch(`${API_BASE}/api/map-data`);
      loadStaticLayers(mapData);
      await loadAllRoutes(mapData);
      map.setFitView([
        layers.s101Polyline,
        layers.westPolyline,
        layers.g312Polyline,
        layers.closureLine,
        ...layers.closureMarkers,
        ...layers.scenicMarkers
      ]);
      bindControls();
    } catch (error) {
      console.error('初始化失败:', error);
      alert(`加载失败：${error.message}`);
    }
  }

  init();
})();
</script>
</body>
</html>
